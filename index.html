<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+2 Pass Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
padding:15px;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
width:100%;
max-width:420px;
text-align:center;
}

h2{
color:#1e3c72;
margin-bottom:10px;
}

.line{
height:4px;
width:60px;
background:#2ecc71;
margin:0 auto 20px;
border-radius:3px;
}

.input-group{
text-align:left;
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-size:0.85rem;
font-weight:600;
}

select,input{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid #eee;
font-size:1rem;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
font-weight:600;
font-size:1rem;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#result{
margin-top:20px;
padding:15px;
border-radius:12px;
display:none;
}

.pass-card{
background:#dcfce7;
color:#166534;
}

.need-card{
background:#fef9c3;
color:#854d0e;
}

.big-mark{
font-size:1.8rem;
font-weight:700;
display:block;
}

.malayalam-text{
font-weight:700;
color:#ff3b3b;
}

/* DEVELOPED BY SECTION */

.footer-section{
margin-top:25px;
border-top:1px solid #eee;
padding-top:15px;
}

.dev-by{
font-size:0.7rem;
font-weight:700;
color:#888;
letter-spacing:2px;
margin-bottom:10px;
}

.animated-name{
display:flex;
justify-content:center;
gap:4px;
}

.animated-name span{
display:inline-block;
font-size:1.8rem;
font-weight:900;
color:#4876ff;
animation:bounce 1.5s infinite ease-in-out;
}

.animated-name span:nth-child(1){animation-delay:0.1s;}
.animated-name span:nth-child(2){animation-delay:0.2s;}
.animated-name span:nth-child(3){animation-delay:0.3s;}
.animated-name span:nth-child(4){animation-delay:0.4s;}
.animated-name span:nth-child(5){animation-delay:0.5s;}
.animated-name span:nth-child(6){animation-delay:0.6s;}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

</style>
</head>

<body>

<div class="card">

<h2>+2 Pass Calculator 🎯</h2>
<div class="line"></div>

<div class="input-group">
<label>Select Subject</label>

<select id="subject" onchange="updateMaxMark()">
<option value="" selected disabled>-- Select Subject --</option>
<option value="80">Business Studies</option>
<option value="80">Economics</option>
<option value="80">English</option>
<option value="80">Second Language</option>
<option value="60">Accountancy</option>
<option value="60">Computer Application</option>
</select>

</div>

<div class="input-group">
<label>Plus One TE Mark</label>
<input type="number" id="p1Mark" placeholder="Enter mark" min="0" max="80">
</div>

<button onclick="calculate()">Check Now</button>

<div id="result"></div>

<!-- DEVELOPED BY -->

<div class="footer-section">

<div class="dev-by">DEVELOPED BY</div>

<div class="animated-name">
<span>M</span>
<span>I</span>
<span>N</span>
<span>H</span>
<span>A</span>
<span>J</span>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function updateMaxMark(){

const subjectValue=document.getElementById("subject").value;
const markInput=document.getElementById("p1Mark");

if(subjectValue==="80"){
markInput.max=80;
markInput.placeholder="Enter mark (Max 80)";
}
else if(subjectValue==="60"){
markInput.max=60;
markInput.placeholder="Enter mark (Max 60)";
}

}

function celebratePass(){

confetti({
particleCount:180,
spread:120,
origin:{y:0.6}
});

}

function calculate(){

const subjectValue=document.getElementById('subject').value;

if(subjectValue===""){
alert("ദയവായി Subject തിരഞ്ഞെടുക്കുക!");
return;
}

const type=parseInt(subjectValue);
const subjectName=document.getElementById('subject').selectedOptions[0].text;

const p1=parseFloat(document.getElementById('p1Mark').value);
const resultDiv=document.getElementById('result');

if(isNaN(p1)){
alert("ദയവായി മാർക്ക് എന്റർ ചെയ്യുക!");
return;
}

let totalNeeded=(type===80)?48:36;
let p2Required=totalNeeded-p1;

resultDiv.style.display="block";

if(p2Required<=0){

celebratePass();

resultDiv.className="pass-card";

resultDiv.innerHTML=`
<span>${subjectName}</span>
<span class="big-mark">PASSED ✅</span>
<small class="malayalam-text">🎉 അഭിനന്ദനങ്ങൾ! രണ്ട് വർഷത്തെയും കൂടി PASS ഉറപ്പായി കഴിഞ്ഞു!</small>
`;

}else{

resultDiv.className="need-card";

resultDiv.innerHTML=`
<span>${subjectName}</span>
<span class="big-mark">${p2Required} Marks</span>
<small class="malayalam-text">🎯 +2 PASS നേടാൻ ഇനി ഇത്ര മാർക്ക് മാത്രം മതിയാകും!</small>
`;

}

}

</script>
    <script>
        // Right click block cheyyan
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Keyboard shortcuts block cheyyan
        document.onkeydown = function(e) {
            if(event.keyCode == 123) { return false; } // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        }
    </script>
</body>
</html>
