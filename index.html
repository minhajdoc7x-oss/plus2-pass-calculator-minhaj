<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+2_Pass_Calculator_Minhaj</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
padding:20px;
}

.card{
background:#fff;
padding:30px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
width:100%;
max-width:420px;
text-align:center;
}

h2{
color:#1e3c72;
margin-bottom:10px;
font-weight:600;
}

.line{
height:4px;
width:50px;
background:#2ecc71;
margin:0 auto 25px;
border-radius:2px;
}

.input-group{
text-align:left;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-size:0.85rem;
font-weight:600;
}

select,input{
width:100%;
padding:14px;
border:2px solid #edf2f7;
border-radius:15px;
font-size:1rem;
background:#f8fafc;
}

button{
width:100%;
padding:16px;
background:#2ecc71;
color:white;
border:none;
border-radius:15px;
font-size:1.1rem;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#27ae60;
}

#result{
margin-top:25px;
padding:20px;
border-radius:15px;
display:none;
}

.pass-card{
background:#dcfce7;
color:#166534;
}

.need-card{
background:#fef9c3;
color:#854d0e;
}

.big-mark{
font-size:2rem;
font-weight:700;
display:block;
}

.malayalam-text{
font-weight:700;
color:#ff3b3b;
}

</style>
</head>

<body>

<div class="card">

<h2>+2 Pass Calculator 🎯</h2>
<div class="line"></div>

<div class="input-group">
<label>Select Subject</label>

<select id="subject" onchange="updateMaxMark()">
<option value="" selected disabled>-- Select Subject --</option>
<option value="80">Business Studies</option>
<option value="80">Economics</option>
<option value="80">English</option>
<option value="80">Second Language</option>
<option value="60">Accountancy</option>
<option value="60">Computer Application</option>
</select>

</div>

<div class="input-group">
<label>Plus One TE Mark</label>
<input type="number" id="p1Mark" placeholder="Enter mark..." min="0" max="80">
</div>

<button id="checkBtn" onclick="calculate()">Check Now</button>

<div id="result"></div>

</div>

<!-- CONFETTI LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function updateMaxMark(){

const subjectValue=document.getElementById("subject").value;
const markInput=document.getElementById("p1Mark");

if(subjectValue==="80"){
markInput.max=80;
markInput.placeholder="Enter mark (Max 80)";
}
else if(subjectValue==="60"){
markInput.max=60;
markInput.placeholder="Enter mark (Max 60)";
}

}

function celebratePass(){

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

}

function calculate(){

const subjectValue=document.getElementById('subject').value;

if(subjectValue===""){
alert("ദയവായി Subject തിരഞ്ഞെടുക്കുക!");
return;
}

const type=parseInt(subjectValue);
const subjectName=document.getElementById('subject').selectedOptions[0].text;

const p1=parseFloat(document.getElementById('p1Mark').value);
const resultDiv=document.getElementById('result');

if(isNaN(p1)){
alert("ദയവായി മാർക്ക് എന്റർ ചെയ്യുക!");
return;
}

let totalNeeded=(type===80)?48:36;
let p2Required=totalNeeded-p1;

resultDiv.style.display="block";

if(p2Required<=0){

celebratePass();

resultDiv.className="pass-card";

resultDiv.innerHTML=`
<span>${subjectName}</span>
<span class="big-mark">PASSED ✅</span>
<small class="malayalam-text">🎉 അഭിനന്ദനങ്ങൾ! രണ്ട് വർഷത്തെയും കൂടി PASS ഉറപ്പായി കഴിഞ്ഞു!</small>
`;

}else{

resultDiv.className="need-card";

resultDiv.innerHTML=`
<span>${subjectName}</span>
<span class="big-mark">${p2Required} Marks</span>
<small class="malayalam-text">🎯 +2 PASS നേടാൻ ഇനി ഇത്ര മാർക്ക് മാത്രം മതിയാകും!</small>
`;

}

}

</script>

</body>
</html>
